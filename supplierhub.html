<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupplierHub — Leverandøropslag</title>
<style>
  :root {
    --ink: #1c2321;
    --paper: #f6f4ee;
    --panel: #ffffff;
    --line: #dcd7c9;
    --accent: #2f5d50;
    --accent-soft: #e4ede9;
    --mda: #2f5d50;
    --sda: #a8622a;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
  header { margin-bottom: 28px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 6px;
  }
  h1 {
    font-size: 30px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
    font-weight: 700;
  }
  .sub { color: #5b5b52; font-size: 14.5px; margin: 0; }

  .search-bar {
    position: relative;
    margin: 22px 0 14px;
  }
  .search-bar input {
    width: 100%;
    padding: 15px 16px 15px 44px;
    font-size: 16px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: var(--panel);
    color: var(--ink);
    font-family: var(--sans);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .search-bar input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-bar svg {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    stroke: #8a8578;
  }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .chip {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: #5b5b52;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s ease;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .count-row {
    font-family: var(--mono);
    font-size: 12px;
    color: #8a8578;
    margin-bottom: 12px;
  }

  .results { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
  }
  .card-main { min-width: 0; }
  .card-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .company {
    font-weight: 700;
    font-size: 16.5px;
    letter-spacing: -0.005em;
  }
  .tag {
    font-family: var(--mono);
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .tag.mda { background: #e4ede9; color: var(--mda); }
  .tag.sda { background: #f4e6d8; color: var(--sda); }
  .contact-name { color: #444038; font-size: 14px; margin-bottom: 6px; }
  .meta-line {
    font-size: 12.5px;
    color: #8a8578;
    margin-bottom: 2px;
  }
  .brand-line { font-size: 12.5px; color: #6d6a5f; font-style: italic; margin-bottom: 6px; }

  .contact-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
    min-width: 190px;
  }
  .contact-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.12s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .contact-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .contact-btn svg { width: 13px; height: 13px; flex-shrink: 0; stroke: currentColor; }
  .contact-btn.copied { background: var(--accent); border-color: var(--accent); color: white; }
  .no-data { color: #b3ae9f; font-style: italic; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8a8578;
  }
  .empty-state svg { width: 40px; height: 40px; stroke: #c9c4b4; margin-bottom: 12px; }

  footer {
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11.5px;
    color: #b3ae9f;
    text-align: center;
  }

  @media (max-width: 560px) {
    .card { grid-template-columns: 1fr; }
    .contact-actions { min-width: 0; }
    h1 { font-size: 25px; }
  }
</style>
</head>

</div>

const searchInput = document.getElementById('searchInput');
const resultsEl = document.getElementById('results');
const countRow = document.getElementById('countRow');
const emptyState = document.getElementById('emptyState');
const filters = document.getElementById('filters');
let activeFilter = 'all';

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const t = escapeHtml(text || '');
  const idx = t.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return t;
  return t.slice(0, idx) + '<mark style="background:#f4e6a8;border-radius:2px;">' + t.slice(idx, idx + q.length) + '</mark>' + t.slice(idx + q.length);
}

function render() {
  const q = searchInput.value.trim().toLowerCase();
  let items = DATA.filter(r => activeFilter === 'all' || r.liste === activeFilter);

  if (q) {
    items = items.filter(r =>
      (r.leverandor && r.leverandor.toLowerCase().includes(q)) ||
      (r.kontakt && r.kontakt.toLowerCase().includes(q)) ||
      (r.mail && r.mail.toLowerCase().includes(q)) ||
      (r.tlf && r.tlf.toLowerCase().includes(q)) ||
      (r.brand && r.brand.toLowerCase().includes(q)) ||
      (r.omrade && r.omrade.toLowerCase().includes(q))
    );
  }

  countRow.textContent = items.length + (items.length === 1 ? ' resultat' : ' resultater');

  if (items.length === 0) {
    resultsEl.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  resultsEl.innerHTML = items.map((r, i) => {
    const tagClass = r.liste.startsWith('MDA') ? 'mda' : 'sda';
    const tagLabel = r.liste.startsWith('MDA') ? 'Hvidevarer' : 'Småapparater';
    return `
      <div class="card">
        <div class="card-main">
          <div class="card-top">
            <span class="company">${highlight(r.leverandor, q)}</span>
            <span class="tag ${tagClass}">${tagLabel}</span>
          </div>
          ${r.brand ? `<div class="brand-line">${escapeHtml(r.brand)}</div>` : ''}
          <div class="contact-name">${highlight(r.kontakt, q) || '<span class="no-data">Ingen kontaktperson angivet</span>'}</div>
          ${r.omrade ? `<div class="meta-line">📍 ${escapeHtml(r.omrade)}</div>` : ''}
          ${r.andet ? `<div class="meta-line">${escapeHtml(r.andet)}</div>` : ''}
        </div>
        <div class="contact-actions">
          ${r.tlf ? `<a class="contact-btn" href="tel:${escapeHtml(r.tlf.replace(/\s/g,''))}" data-copy="${escapeHtml(r.tlf)}" data-type="tlf">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${highlight(r.tlf, q) || 'Ukendt'}
          </a>` : `<div class="contact-btn no-data"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Intet nummer</div>`}
          ${r.mail ? `<div class="contact-btn" data-copy="${escapeHtml(r.mail)}" data-type="mail">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg>
            ${highlight(r.mail, q) || 'Ukendt'}
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.contact-btn[data-copy]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (btn.tagName === 'A' && btn.dataset.type === 'tlf') return; // let tel: link work, but also copy
      navigator.clipboard.writeText(btn.dataset.copy).then(() => flashCopied(btn));
    });
  });
}

function flashCopied(btn) {
  const original = btn.innerHTML;
  btn.classList.add('copied');
  const label = btn.dataset.type === 'mail' ? 'Mail kopieret' : 'Nummer kopieret';
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> ${label}`;
  setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1200);
}

searchInput.addEventListener('input', render);
filters.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.filter;
  render();
});

render();
</script>
